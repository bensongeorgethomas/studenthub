<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - StudyHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h2>Create an Account</h2>
            <p class="subtitle">Enter your details to register.</p>

            <form id="registerForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" id="submitBtn">Register</button>
            </form>
            <div style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
                <a href="login.html" style="color: var(--primary-color); text-decoration: none;">Already have an
                    account? Login here.</a>
            </div>
        </div>
    </div>

    <script src="register.js"></script>
</body>

</html>
