<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - StudyHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --gradient-start: #0f766e;
            --gradient-end: #14b8a6;
            --primary-color: #14b8a6;
            --primary-hover: #0d9488;
            --input-focus-ring: rgba(20, 184, 166, 0.25);
        }

        .teacher-badge {
            display: inline-block;
            background: rgba(20, 184, 166, 0.12);
            color: #14b8a6;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            border: 1px solid rgba(20, 184, 166, 0.25);
        }
    </style>
</head>

<body data-login-role="teacher">
    <div class="split-layout">
        <div class="image-section">
            <div class="decorative-circle-1" style="background: linear-gradient(to right, rgba(0,0,0,0.25), transparent);"></div>
            <div class="decorative-circle-2" style="background: linear-gradient(to left, rgba(0,0,0,0.2), transparent);"></div>
            <div class="glass-panel">
                <span class="teacher-badge">Faculty Access</span>
                <h1>StudyHub<br>Teacher Portal</h1>
                <p>Manage student progress, assignments, and attendance in a single workspace built for educators.</p>
            </div>
        </div>

        <div class="form-section">
            <div class="login-container">
                <div class="brand">
                    <span class="logo-icon">TH</span>
                    <span>Teacher Portal</span>
                </div>

                <h2>Sign In</h2>
                <p class="subtitle">Use your staff credentials to continue.</p>

                <form id="adminLoginForm" data-login-role="teacher">
                    <div class="input-group">
                        <label for="email">Teacher Email</label>
                        <input type="email" id="email" name="email" placeholder="teacher@studyhub.ai" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" id="submitBtn">Access Portal</button>
                </form>

                <div class="signup-link">
                    <a href="../index.html" style="color: var(--text-secondary);">Return to StudyHub Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../admin/admin-login.js"></script>
</body>

</html>
