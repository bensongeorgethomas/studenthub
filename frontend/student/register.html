<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - StudyHub</title>
    <!-- Use Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <div class="split-layout">
        <div class="image-section">
            <div class="glass-panel">
                <h1>Start Your Journey.</h1>
                <p>Create an account to join the community and access StudyHub's intelligent tools and comprehensive resources.</p>
            </div>
            <div class="decorative-circle-1"></div>
            <div class="decorative-circle-2"></div>
        </div>
        <div class="form-section">
            <div class="login-container">
                <div class="brand">
                    <span class="logo-icon">✨</span> StudyHub
                </div>
                <h2>Create an Account</h2>
                <p class="subtitle">Please enter your details to sign up.</p>

                <form id="registerForm" enctype="multipart/form-data">
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="input-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" required>
                            <option value="">Select your Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Electrical Engineering">Electrical Engineering</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="passoutYear">Passout Year</label>
                        <input type="number" id="passoutYear" name="passout_year" min="2000" max="2100" placeholder="e.g. 2026" required>
                    </div>

                    <div class="input-group">
                        <label for="idCardImage">Upload Proof (ID Card)</label>
                        <input type="file" id="idCardImage" name="id_card_image" accept="image/png, image/jpeg, image/jpg" required>
                        <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem; display: block;">Only PNG, JPG, JPEG formats allowed</small>
                    </div>

                    <button type="submit" id="submitBtn">Sign Up</button>

                    <p class="signup-link">Already have an account? <a href="login.html">Sign in</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="register.js"></script>
</body>

</html>
