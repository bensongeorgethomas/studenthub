<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Progress - StudyHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../student/community-pages.css">
    <link rel="stylesheet" href="teacher-dashboard.css">
</head>

<body class="hub-body" data-page="teacher-dashboard" data-layout="multipage" data-view="performance">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <div class="hub-layout">
        <aside class="hub-sidebar">
            <h2 class="sidebar-brand">StudyHub Teacher</h2>
            <p class="sidebar-user">Hello, <span id="teacherName">Teacher</span></p>

            <nav class="sidebar-nav">
                <a href="teacher-dashboard.html" data-view="overview">📊 Overview</a>
                <a href="teacher-communication.html" data-view="communication">💬 Communication</a>
                <a href="teacher-records.html" data-view="records">📁 Student Records</a>
                <a href="teacher-performance.html" data-view="performance">📈 Student Progress</a>
                <a href="teacher-grades.html" data-view="grades">🎓 Grades</a>
                <a href="teacher-assignments.html" data-view="assignments">📋 Assignments</a>
                <a href="teacher-announcements.html" data-view="announcements">📢 Announcements</a>
                <a href="teacher-attendance.html" data-view="attendance">✅ Attendance</a>
                <a href="teacher-profile.html" data-view="profile">👤 My Profile</a>
            </nav>

            <button id="logoutBtn" class="sidebar-logout">Logout</button>
        </aside>

        <main class="hub-main">
            <header class="page-header">
                <h2 id="viewTitle">Student Progress</h2>
                <p id="viewSubtitle">Record ups and downs for each student.</p>
            </header>

            <section id="view-performance" class="teacher-view active">
                <div class="teacher-grid two-col">
                    <div class="teacher-card">
                        <h3>Student Progress Check</h3>
                        <div class="detail-grid">
                            <select id="performanceStudentSelect"></select>
                            <div>
                                <label class="readonly-note">Rating: <span id="performanceRatingValue">3</span>/5</label>
                                <input id="performanceRating" type="range" min="1" max="5" value="3">
                            </div>
                        </div>
                        <div class="detail-section">
                            <textarea id="performanceUps" placeholder="Ups: strengths, wins, improvements"></textarea>
                        </div>
                        <div class="detail-section">
                            <textarea id="performanceDowns" placeholder="Downs: gaps, risks, areas to watch"></textarea>
                        </div>
                        <button id="savePerformanceBtn" class="community-submit-btn">Save Progress Notes</button>
                    </div>

                    <div class="teacher-card">
                        <h3>Recent Progress Notes</h3>
                        <div id="performanceSummary" class="teacher-list"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="teacher-dashboard.js"></script>
</body>

</html>
