<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub - Login</title>
    <!-- Use Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="split-layout">
        <div class="image-section">
            <div class="glass-panel">
                <h1>Unlock Your Potential.</h1>
                <p>Join the community of learners and achieve your goals with StudyHub's intelligent tools and
                    comprehensive resources.</p>
            </div>
            <div class="decorative-circle-1"></div>
            <div class="decorative-circle-2"></div>
        </div>
        <div class="form-section">
            <div class="login-container">
                <div class="brand">
                    <span class="logo-icon">✨</span> StudyHub
                </div>
                <h2>Welcome Back</h2>
                <p class="subtitle">Please enter your details to sign in.</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="options">
                        <label class="remember">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" id="submitBtn">Sign In</button>

                    <p class="signup-link">Don't have an account? <a href="#">Sign up</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
